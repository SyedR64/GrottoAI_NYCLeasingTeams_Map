<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
  body { display: flex; height: 100vh; overflow: hidden; background: #f5f5f5; }
  #sidebar {
    width: 340px; min-width: 340px; background: #0f1b2e; color: #fff;

  }
  #sidebar-header {
    padding: 16px 18px 12px;
    background: #0a1220;
    border-bottom: 2px solid #1e7c5a;
  }
  #sidebar-header h1 { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.2; }
  #sidebar-header p { font-size: 11px; color: #88aacc; margin-top: 4px; }
  #controls { padding: 12px 16px; background: #0e1828; border-bottom: 1px solid #1a2f4a; }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .filter-btn {
    padding: 4px 10px; font-size: 11px; border-radius: 12px; border: none;
    cursor: pointer; font-weight: 600; transition: all 0.15s;
    background: #1a2f4a; color: #88aacc;
  }
  .filter-btn.active { background: #1e7c5a; color: #fff; }
  #search-input {
    width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid #1a3a5c;
    background: #0a1220; color: #fff; font-size: 12px; outline: none;
  }
  #search-input::placeholder { color: #446688; }
  #stats { padding: 10px 16px; background: #0b1525; border-bottom: 1px solid #1a2f4a; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 6px; }
  .stat-box { background: #0e1828; border-radius: 6px; padding: 7px 8px; text-align: center; }
  .stat-val { font-size: 14px; font-weight: 700; color: #3dd68c; }
  .stat-lbl { font-size: 9px; color: #556a88; margin-top: 1px; }
  .total-count { font-size: 11px; color: #88aacc; }
  #list { flex: 1; overflow-y: auto; padding: 8px 0; }
  #list::-webkit-scrollbar { width: 4px; }
  #list::-webkit-scrollbar-track { background: #0a1220; }
  #list::-webkit-scrollbar-thumb { background: #1a3a5c; border-radius: 2px; }
  .prop-card {
    padding: 10px 16px; border-bottom: 1px solid #1a2f4a; cursor: pointer;
    transition: background 0.12s;
  }
  .prop-card:hover { background: #0e1c30; }
  .prop-card.active { background: #0d2a1a; border-left: 3px solid #1e7c5a; }
  .prop-name { font-size: 12px; font-weight: 700; color: #e0eaff; margin-bottom: 2px; }
  .prop-meta { font-size: 10px; color: #557799; margin-bottom: 4px; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 5px; }
  .tag {
    font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 8px;
  }
  .tag-mgt { background: #1a3a5c; color: #88ccff; }
  .tag-size { background: #1a2f1a; color: #3dd68c; }
  .tag-rent { background: #2a1f0a; color: #f0a030; }
  .contact-section { margin-top: 4px; }
  .contact-item { font-size: 10px; color: #88aacc; line-height: 1.6; }
  .contact-item a { color: #3dd68c; text-decoration: none; }
  .contact-label { color: #3dd68c; font-weight: 700; font-size: 9px; }
  #map { flex: 1; z-index: 1; }
  .leaflet-popup-content-wrapper { background: #0f1b2e; border: 1px solid #1e7c5a; border-radius: 8px; color: #fff; }
  .leaflet-popup-tip { background: #0f1b2e; }
  .popup-title { font-size: 13px; font-weight: 700; color: #3dd68c; margin-bottom: 4px; }
  .popup-mgr { font-size: 11px; color: #88aacc; margin-bottom: 6px; }
  .popup-row { font-size: 10px; color: #ccdde6; margin: 2px 0; }
  .popup-contact { margin-top: 6px; font-size: 10px; line-height: 1.7; }
  .popup-contact strong { color: #3dd68c; }

const OPERATOR_COLORS = {
  "TF Cornerstone": "#3dd68c",
  "Related": "#4a9eff",
  "Brookfield": "#ff9f40",
  "Equity Residential": "#c088ff",
  "AvalonBay": "#ff6b6b",
  "Glenwood": "#ffd700",
  "Two Trees": "#00d4cc",
  "RockRose": "#ff8c69",
  "Extell": "#98fb98",
  "Bozzuto": "#dda0dd"
};

let map, markers = [], activeFilters = { type: 'all', region: 'all' }, activeCardId = null;

function initMap() {
  map = L.map('map', { center: [40.74, -73.97], zoom: 12 });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    maxZoom: 19
  }).addTo(map);

  PROPERTIES.forEach(p => {
    const color = OPERATOR_COLORS[p.operator] || '#888';
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 6px ${color}88;"></div>`,
      iconSize: [14, 14], iconAnchor: [7, 7]
    });

    const contacts = p.leasing.map(c =>
      `<div class="popup-row"><strong style="color:#3dd68c">${c.role}:</strong> ${c.name}<br>
       📞 <a href="tel:${c.phone}" style="color:#88ccff">${c.phone}</a> |
       ✉️ <a href="mailto:${c.email}" style="color:#88ccff">${c.email}</a></div>`
    ).join('');

    const popup = `
      <div style="min-width:240px">
        <div class="popup-title">${p.name}</div>
        <div class="popup-mgr">${p.operator} · ${p.neighborhood}</div>
        <div class="popup-row">🏢 ${p.units} units · ${p.type}</div>
        <div class="popup-row">💰 ${p.rents}/mo</div>
        <div class="popup-row">🕐 ${p.hours}</div>
        <div class="popup-contact">${contacts}</div>
        <div class="popup-row" style="margin-top:5px;color:#88aacc;font-style:italic">${p.notes}</div>
      </div>`;

    const marker = L.marker([p.lat, p.lng], { icon }).addTo(map).bindPopup(popup, { maxWidth: 320 });
    marker.on('click', () => { setActive(p.id); scrollToCard(p.id); });
    markers.push({ id: p.id, marker, prop: p });
  });

  renderList(PROPERTIES);
}

function renderList(props) {
  const list = document.getElementById('list');
  list.innerHTML = '';
  document.getElementById('visible-count').textContent = `${props.length} properties displayed`;
  props.forEach(p => {
    const color = OPERATOR_COLORS[p.operator] || '#888';
    const contacts = p.leasing.map(c =>
      `<div class="contact-item"><span class="contact-label">${c.role}:</span> ${c.name} · <a href="tel:${c.phone}">${c.phone}</a> · <a href="mailto:${c.email}">${c.email}</a></div>`
    ).join('');

    const card = document.createElement('div');
    card.className = `prop-card${activeCardId === p.id ? ' active' : ''}`;
    card.id = `card-${p.id}`;
    card.innerHTML = `
      <div class="prop-name" style="color:${color}">${p.name}</div>
      <div class="prop-meta">${p.operator} · ${p.neighborhood} · ${p.borough}</div>
      <div class="tag-row">
        <span class="tag tag-mgt">${p.operator}</span>
        <span class="tag tag-size">${p.units} units</span>
        <span class="tag tag-rent">${p.rents}</span>
      </div>
      <div class="contact-section">${contacts}</div>
      <div class="contact-item" style="color:#556a88;margin-top:3px;font-style:italic">${p.notes}</div>`;
    card.onclick = () => {
      setActive(p.id);
      const m = markers.find(m => m.id === p.id);
      if (m) { map.setView([p.lat, p.lng], 14); m.marker.openPopup(); }
    };
    list.appendChild(card);
  });
}

function setActive(id) {
  activeCardId = id;
  document.querySelectorAll('.prop-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById(`card-${id}`);
  if (card) card.classList.add('active');
}

function scrollToCard(id) {
  const card = document.getElementById(`card-${id}`);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function filterAll() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const filtered = PROPERTIES.filter(p => {
    const matchType = activeFilters.type === 'all' || p.operator === activeFilters.type;
    const matchRegion = activeFilters.region === 'all' ||
      (activeFilters.region === 'Queens' && p.borough === 'Queens') ||
      (activeFilters.region === 'Brooklyn' && p.borough === 'Brooklyn') ||
      (activeFilters.region === 'Manhattan' && p.borough === 'Manhattan');
    const matchSearch = !search || p.name.toLowerCase().includes(search) ||
      p.operator.toLowerCase().includes(search) || p.neighborhood.toLowerCase().includes(search) ||
      p.borough.toLowerCase().includes(search);
    return matchType && matchRegion && matchSearch;
  });
  renderList(filtered);
  markers.forEach(({ id, marker }) => {
    const visible = filtered.some(p => p.id === id);
    if (visible) { if (!map.hasLayer(marker)) marker.addTo(map); }
    else { if (map.hasLayer(marker)) map.removeLayer(marker); }
  });
}

document.getElementById('type-filters').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.querySelectorAll('#type-filters .filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilters.type = e.target.dataset.type;
  filterAll();
});

document.getElementById('region-filters').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.querySelectorAll('#region-filters .filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilters.region = e.target.dataset.region;
  filterAll();
});

initMap();
</script>
</body>
