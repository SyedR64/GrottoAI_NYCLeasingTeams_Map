.sb { background: #0e1828; border-radius: 4px; padding: 4px 5px; text-align: center; }
.sv { font-size: 12px; font-weight: 700; color: #3dd68c; }
.sl { font-size: 8px; color: #334455; margin-top: 1px; }
.vc { font-size: 9px; color: #446688; }
#list { flex: 1; overflow-y: auto; }

.pc { padding: 7px 12px; border-bottom: 1px solid #0e1c2a; cursor: pointer; transition: background 0.1s; }
.pc:hover { background: #0d1e30; }
.pc.active { background: #091a12; border-left: 3px solid #1e7c5a; padding-left: 9px; }
.pn { font-size: 11px; font-weight: 700; margin-bottom: 1px; }
.ps { font-size: 9px; color: #3a5570; margin-bottom: 3px; }

.tu { background: #0f2a18; color: #3dd68c; }
.tr2 { background: #2a1e08; color: #cc8a20; }
.tn { background: #251535; color: #bb77ee; }

.clbl { color: #3dd68c; font-weight: 700; font-size: 8px; }
.nt { font-size: 8px; color: #2a3d50; margin-top: 2px; font-style: italic; }
#map { flex: 1; }

let map, markers=[], flt={region:"all",status:"all"}, aid=null;

function fmtN(n){return n>=10000?Math.round(n/1000)+"K+":n>=1000?(n/1000).toFixed(0)+"K+":n.toString();}
function totalU(ps){return ps.reduce((s,p)=>s+(isNaN(p.u)?0:p.u),0);}
function uniq(ps,k){return new Set(ps.map(p=>p[k])).size;}

function initMap(){
  map=L.map('map',{center:[40.74,-73.97],zoom:11});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OSM &copy; CARTO',maxZoom:19}).addTo(map);
  P.forEach(p=>{
    const col=RC[p.r]||'#888', isNew=p.y>=2022, isMega=p.u>=3000;
    const sz=isMega?20:isNew?16:13;
    const ico=L.divIcon({className:'',
      html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col};border:${isMega?'3px':'2px'} solid ${isMega?'#ffe066':'rgba(255,255,255,0.6)'};box-shadow:0 0 ${isMega?12:isNew?7:4}px ${col}99;"></div>`,
      iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]
    });
    const ct=p.c.map(c=>`<div class="pr"><strong style="color:#3dd68c">${c.ro}:</strong> ${c.nm}<br>📞 <a href="tel:${c.ph}" style="color:#88ccff">${c.ph}</a> · ✉️ <a href="mailto:${c.em}" style="color:#88ccff">${c.em}</a></div>`).join('');
    const pop=`<div style="min-width:240px">
      <div class="pt">${SI[p.s]||''} ${p.n}</div>
      <div class="pm">${p.op} · ${p.h} · ${p.r}</div>
      <div class="pr">🏢 ${p.u.toLocaleString()} units · ${p.y}</div>
      <div class="pr">💰 ${p.rn}/mo · ${p.s}</div>
      <div class="pr">🕐 ${p.ho}</div>
      <div class="pc2">${ct}</div>
      <div class="pr" style="margin-top:4px;color:#4a6a80;font-style:italic;font-size:9px">${p.nt}</div>
    </div>`;
    const mk=L.marker([p.lat,p.lng],{icon:ico}).addTo(map).bindPopup(pop,{maxWidth:320});
    mk.on('click',()=>{setA(p.id);scrollC(p.id);});
    markers.push({id:p.id,marker:mk,prop:p});
  });
  updateStats(P); renderList(P);
}

function renderList(ps){
  const list=document.getElementById('list');
  list.innerHTML='';
  document.getElementById('vc').textContent=`${ps.length} properties`;
  updateStats(ps);
  ps.forEach(p=>{
    const col=RC[p.r]||'#888', isNew=p.y>=2022, isMega=p.u>=3000;
    const ct=p.c.map(c=>`<div class="ci"><span class="clbl">${c.ro}:</span> ${c.nm} · <a href="tel:${c.ph}">${c.ph}</a> · <a href="mailto:${c.em}">${c.em}</a></div>`).join('');
    const d=document.createElement('div');
    d.className=`pc${aid===p.id?' active':''}`;
    d.id=`card-${p.id}`;
    d.innerHTML=`
      <div class="pn" style="color:${col}">${SI[p.s]||''} ${p.n}</div>
      <div class="ps">${p.op} · ${p.h} · ${p.a}</div>
      <div class="tr">
        <span class="tg to">${p.r}</span>
        <span class="tg tu">${p.u.toLocaleString()} units</span>
        <span class="tg tr2">${p.rn}</span>
        ${isNew?`<span class="tg tn">New ${p.y}</span>`:''}
        ${isMega?`<span class="tg" style="background:#3a2a00;color:#ffe066">⭐ Mega</span>`:''}
      </div>
      <div>${ct}</div>
      <div class="nt">${p.nt}</div>`;
    d.onclick=()=>{setA(p.id);const m=markers.find(m=>m.id===p.id);if(m){map.setView([p.prop.lat,p.prop.lng],14);m.marker.openPopup();}};
    list.appendChild(d);
  });
}

function updateStats(ps){
  document.getElementById('sp').textContent=ps.length;
  document.getElementById('su').textContent=fmtN(totalU(ps));
  document.getElementById('sr').textContent=uniq(ps,'r');
  document.getElementById('so').textContent=uniq(ps,'op');
}
function setA(id){
  aid=id;
  document.querySelectorAll('.pc').forEach(c=>c.classList.remove('active'));
  const c=document.getElementById(`card-${id}`);
  if(c)c.classList.add('active');
}
function scrollC(id){const c=document.getElementById(`card-${id}`);if(c)c.scrollIntoView({behavior:'smooth',block:'nearest'});}

function fAll(){
  const q=document.getElementById('si').value.toLowerCase();
  const res=P.filter(p=>{
    const mr=flt.region==='all'||p.r===flt.region;
    const ms=flt.status==='all'||p.s===flt.status;
    const mq=!q||p.n.toLowerCase().includes(q)||p.op.toLowerCase().includes(q)||p.h.toLowerCase().includes(q)||p.r.toLowerCase().includes(q)||p.a.toLowerCase().includes(q)||p.nt.toLowerCase().includes(q);
    return mr&&ms&&mq;
  });
  renderList(res);
  markers.forEach(({id,marker})=>{
    const vis=res.some(p=>p.id===id);
    if(vis){if(!map.hasLayer(marker))marker.addTo(map);}
    else{if(map.hasLayer(marker))map.removeLayer(marker);}
  });
}

document.getElementById('rf').addEventListener('click',e=>{
  if(!e.target.matches('.fb'))return;
  document.querySelectorAll('#rf .fb').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  flt.region=e.target.dataset.v;
  fAll();
});
document.getElementById('sf').addEventListener('click',e=>{
  if(!e.target.matches('.fb'))return;
  document.querySelectorAll('#sf .fb').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  flt.status=e.target.dataset.v;
  fAll();
});

initMap();
</script>
